services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-user-system-app
    ports:
      - "8082:8082"
    environment:
      APP_PORT: "8082"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: go_user_system
      JWT_SECRET: dev_jwt_secret_change_me
      JWT_EXPIRE_HOURS: "24"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: go-user-system-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: go_user_system
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
